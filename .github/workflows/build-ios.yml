name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: node ./node_modules/.bin/vite build

      - name: Install Capacitor iOS
        run: npm install @capacitor/ios

      - name: Sync Capacitor
        run: node ./node_modules/.bin/cap sync ios

      - name: Build app
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ../DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | grep -E "BUILD|error:" | tail -5

      - name: Package IPA
        run: |
          cd ios/App
          APP=$(find ../DerivedData -name "App.app" -path "*/Release-iphoneos/*" | head -1)
          echo "App: $APP"
          mkdir Payload && cp -r "$APP" Payload/ && zip -qr App.ipa Payload && rm -rf Payload
          ls -lh App.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: iOS Build
          tag_name: build-${{ github.run_number }}
          files: ios/App/App.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
