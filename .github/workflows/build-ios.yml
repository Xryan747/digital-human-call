name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: node ./node_modules/.bin/vite build

      - name: Install Capacitor iOS
        run: npm install @capacitor/ios

      - name: Sync Capacitor
        run: node ./node_modules/.bin/cap sync ios

      - name: Build app with xcodebuild
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ../DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tail -30

      - name: Package IPA
        run: |
          # Find the built .app
          APP_PATH=$(find ios/DerivedData -name "App.app" -path "*/Release-iphoneos/*" | head -1)
          echo "App found at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find built App.app"
            find ios/DerivedData -name "App.app" 2>/dev/null || echo "No .app found anywhere"
            exit 1
          fi
          # Create IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r DigitalHuman.ipa Payload
          rm -rf Payload
          ls -la DigitalHuman.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DigitalHuman.ipa
          path: DigitalHuman.ipa
          retention-days: 7
